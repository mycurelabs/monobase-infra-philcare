# Valkey ExternalSecret
# Syncs Valkey credentials from GCP Secret Manager to Kubernetes
# Used by: valkey chart (Bitnami), Cadence

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: valkey-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: valkey-credentials
    app.kubernetes.io/component: external-secrets
spec:
  # Refresh interval - how often to sync from GCP
  refreshInterval: 1h

  # Reference to ClusterSecretStore
  secretStoreRef:
    name: gcp-secretstore
    kind: ClusterSecretStore

  # Target Kubernetes secret
  target:
    name: valkey
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Valkey password - required by Bitnami Valkey chart
        valkey-password: {{ `"{{ .valkeyPassword }}"` }}

  # Data to fetch from GCP Secret Manager
  data:
    - secretKey: valkeyPassword
      remoteRef:
        key: {{ .Values.global.secretPrefix | default .Values.global.namespace }}-valkey-password
