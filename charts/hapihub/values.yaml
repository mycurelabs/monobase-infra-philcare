# Default values for HapiHub chart
# This is a YAML-formatted file with sensible defaults
# Override these values in deployments/{env}/values.yaml

# Global configuration (shared across charts)
global:
  domain: example.com
  namespace: example-prod
  environment: production
  gateway:
    name: shared-gateway
    namespace: gateway-system

# HapiHub application configuration
enabled: true

replicaCount: 2

image:
  repository: ghcr.io/mycurelabs/hapihub
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Better Auth - Authentication configuration
betterAuth:
  passkey:
    rpName: "Acme"  # Relying Party name for WebAuthn/Passkeys (override per deployment)
    rpId: "example.com"  # Relying Party ID - should match your domain (override per deployment)

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 7500
  targetPort: 7500
  annotations: {}

# Gateway API HTTPRoute configuration
gateway:
  enabled: true
  hostname: ""  # Empty = uses hapihub.{global.domain}
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
  
  # HTTPRoute timeout configuration
  # Disabled by default — nginx-shared-gateway (NGF 2.4.1) doesn't
  # implement spec.rules[].timeouts and reports UnsupportedField, which
  # propagates as Degraded health in ArgoCD. Use snippetsPolicy below
  # to apply proxy_read_timeout via NGF SnippetsPolicy instead.
  # If you re-enable, set timeouts.request and/or timeouts.backendRequest.
  timeouts: null
  
  # BackendTrafficPolicy configuration for connection settings
  backendTrafficPolicy:
    enabled: false  # Disabled - using HTTPRoute timeouts instead
    timeout:
      # Connection idle timeout - how long to keep idle connections open
      # connectionIdleTimeout: "300s"

  # NGINX Gateway SnippetsPolicy for proxy timeout tuning
  snippetsPolicy:
    enabled: false
    proxyReadTimeout: "3600s"
    clientMaxBodySize: "50m"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 7500
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 7500
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Node pool scheduling (optional, disabled by default)
# Inherits from global.nodePool if configured
# nodePool:
#   enabled: false     # Set to false to explicitly disable (overrides global)
#   name: "staging"    # Override global node pool name

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - hapihub
          topologyKey: kubernetes.io/hostname

# Application configuration (ConfigMap)
config:
  # NOTE: PORT removed - causes known issue in HapiHub (port: NaN error)
  # App automatically uses default port 7500
  CLUSTER_INSTANCES: "1"  # Default to single instance to prevent OOM; override if needed
  RUN_WORKERS: "true"
  DB_SKIP_CREATE_INDEXES: "false"
  DB_RECREATE_INDEX_ON_CONFLICT: "false"
  # CORS - secure defaults (override per environment)
  CORS_STRICT: "true"
  CORS_ALLOW_LOCAL_NETWORK: "false"
  CORS_ALLOW_TUNNELING: "false"
  CORS_ALLOW_MOBILE_APPS: "true"
  CORS_CREDENTIALS: "true"
  # CORS_ORIGINS must be set per deployment

# External Secrets configuration
externalSecrets:
  enabled: false
  secretStore: ""
  refreshInterval: 1h
  secrets: []
  # Example secrets configuration:
  # secrets:
  #   - secretKey: GOOGLE_CLIENT_ID
  #     remoteKey: mycure-staging-google-oauth-client-id
  #   - secretKey: GOOGLE_CLIENT_SECRET
  #     remoteKey: mycure-staging-google-oauth-client-secret
  #   - secretKey: STRIPE_SECRET_KEY
  #     remoteKey: mycure-staging-stripe-secret-key

# MongoDB dependency configuration (deployed separately)
mongodb:
  enabled: true
  # Use external/managed MongoDB (e.g., DigitalOcean, Atlas) via MONGO_URI from ExternalSecrets
  external: false
  # Service name - points to separate MongoDB release (only used when external: false)
  serviceName: "mongodb"
  database: "hapihub"
  replicaSet: "rs0"
  auth:
    enabled: false
    existingSecret: ""

# PostgreSQL dependency configuration (v11+, deployed separately)
postgresql:
  enabled: false
  # Use external/managed PostgreSQL via DATABASE_URI from ExternalSecrets
  external: false
  # Service name - points to separate PostgreSQL release (only used when external: false)
  serviceName: "postgresql"
  auth:
    database: hapihub
    username: postgres
    existingSecret: ""

# Valkey (Redis) dependency configuration
valkey:
  enabled: false
  serviceName: "valkey-master"

# MinIO dependency configuration
minio:
  enabled: false
  serviceName: "minio"

# Mailpit dependency configuration
mailpit:
  enabled: false
  serviceName: "mailpit"

# Backup/Velero configuration
backup:
  enabled: false

# Service Monitor for Prometheus (if monitoring enabled)
serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
