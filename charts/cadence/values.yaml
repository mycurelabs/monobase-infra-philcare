# Default values for Cadence chart
# This is a YAML-formatted file with sensible defaults
# Override these values in deployments/{env}/values.yaml

# Global configuration (shared across charts)
global:
  domain: example.com
  namespace: example-prod
  environment: production
  gateway:
    name: shared-gateway
    namespace: gateway-system

# Cadence application configuration
enabled: true

replicaCount: 1

image:
  repository: ghcr.io/mycurelabs/cadence
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 7890
  targetPort: 7890
  annotations: {}

# Gateway API HTTPRoute configuration
gateway:
  enabled: true
  hostname: ""  # Empty = uses cadence.{global.domain}

  # NGINX Gateway SnippetsPolicy for WebSocket support
  snippetsPolicy:
    enabled: false
    proxyReadTimeout: "3600s"
    clientMaxBodySize: "10m"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 7890
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 7890
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Node pool scheduling (optional, disabled by default)
# Inherits from global.nodePool if configured
# nodePool:
#   enabled: false
#   name: "staging"

nodeSelector: {}

tolerations: []

affinity: {}

# Persistent storage for Cadence metadata (SQLite files)
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  mountPath: /app/data

# Cadence config file (mounted as /app/cadence.yml)
cadenceConfig:
  collections:
    "*":
      strategy: lww
      scope_rules:
        facility: organization
        organization: organization
        warehouse: organization
        account: organization
        created_by: user
    accounts:
      strategy: lww
      scope_columns:
        user: id
    personal_details:
      strategy: lww
      scope_columns:
        user: id
        organization: facility
    personal_details_history:
      strategy: lww
      scope_columns:
        user: id
        organization: facility
  collectionsBlacklist:
    - "--drizzle-migrations"
    - "-migration-checkpoints"

# Application configuration (ConfigMap env vars)
config:
  RUST_LOG: "info"

# External Secrets configuration
externalSecrets:
  enabled: false
  secretStore: ""
  secretStoreKind: SecretStore
  refreshInterval: 1h
  secrets: []

# PostgreSQL dependency configuration (deployed separately)
postgresql:
  enabled: false
  serviceName: "postgresql"
  auth:
    database: hapihub
    username: postgres
    existingSecret: ""

# HapiHub dependency — used to construct JWKS URL for JWT validation
hapihub:
  serviceName: "hapihub"
  port: 7500

# Valkey dependency configuration (optional metadata backend)
valkey:
  enabled: false
  serviceName: "valkey-primary"  # Bitnami chart uses valkey-primary for standalone
  port: 6379
  auth:
    existingSecret: "valkey"     # Bitnami chart creates this secret
    secretKey: "valkey-password"

# Network Policy
networkPolicy:
  enabled: false

# Service Monitor for Prometheus (if monitoring enabled)
serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
