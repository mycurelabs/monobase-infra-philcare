{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cadence.fullname" . }}
  namespace: {{ include "cadence.namespace" . }}
  labels:
    {{- include "cadence.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  cadence.yml: |
    collections:
      {{- range $name, $col := .Values.cadenceConfig.collections }}
      {{ $name | quote }}:
        strategy: {{ $col.strategy }}
        {{- if $col.scope_rules }}
        scope_rules:
          {{- range $k, $v := $col.scope_rules }}
          {{ $k }}: {{ $v }}
          {{- end }}
        {{- end }}
        {{- if $col.scope_columns }}
        scope_columns:
          {{- range $k, $v := $col.scope_columns }}
          {{ $k }}: {{ $v }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- if .Values.cadenceConfig.collectionsBlacklist }}
    collections_blacklist:
      {{- range .Values.cadenceConfig.collectionsBlacklist }}
      - {{ . | quote }}
      {{- end }}
    {{- end }}
{{- end }}
