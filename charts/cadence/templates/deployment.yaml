{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cadence.fullname" . }}
  namespace: {{ include "cadence.namespace" . }}
  labels:
    {{- include "cadence.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cadence.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "cadence.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cadence.serviceAccountName" . }}
      enableServiceLinks: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.postgresql.enabled }}
        command: ["/bin/sh", "-c"]
        args:
          - exec cadence --primary-db "postgres://${POSTGRESQL_USER}:${POSTGRESQL_PASSWORD}@{{ include "cadence.postgresql.host" . }}:5432/{{ include "cadence.postgresql.database" . }}"
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- if .Values.livenessProbe.httpGet }}
          httpGet:
            path: {{ .Values.livenessProbe.httpGet.path }}
            port: {{ .Values.livenessProbe.httpGet.port | default "http" }}
          {{- end }}
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
        {{- end }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- if .Values.readinessProbe.httpGet }}
          httpGet:
            path: {{ .Values.readinessProbe.httpGet.path }}
            port: {{ .Values.readinessProbe.httpGet.port | default "http" }}
          {{- end }}
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
        # Data directory for metadata storage
        - name: CADENCE_DATA_DIR
          value: {{ if .Values.persistence.enabled }}{{ .Values.persistence.mountPath | default "/app/data" }}{{ else }}"/tmp/cadence-data"{{ end }}
        # PostgreSQL connection
        {{- if .Values.postgresql.enabled }}
        - name: POSTGRESQL_USER
          value: {{ include "cadence.postgresql.username" . | quote }}
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.auth.existingSecret | default "postgresql" }}
              key: postgres-password
        - name: CADENCE_PRIMARY_DB_URL
          value: "postgres://$(POSTGRESQL_USER):$(POSTGRESQL_PASSWORD)@{{ include "cadence.postgresql.host" . }}:5432/{{ include "cadence.postgresql.database" . }}"
        {{- end }}
        # JWKS URL for JWT validation (from HapiHub)
        - name: CADENCE_JWKS_URL
          value: {{ include "cadence.hapihub.jwksUrl" . | quote }}
        # Valkey metadata backend
        {{- if .Values.valkey.enabled }}
        - name: CADENCE_METADATA_BACKEND
          value: "valkey"
        - name: VALKEY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.valkey.auth.existingSecret | default "valkey" }}
              key: {{ .Values.valkey.auth.secretKey | default "valkey-password" }}
        - name: CADENCE_VALKEY_URL
          value: "redis://:$(VALKEY_PASSWORD)@{{ include "cadence.valkey.host" . }}:{{ .Values.valkey.port | default 6379 }}"
        {{- end }}
        # Load secrets from External Secrets Operator
        {{- if .Values.externalSecrets.enabled }}
        {{- range .Values.externalSecrets.secrets }}
        - name: {{ .secretKey }}
          valueFrom:
            secretKeyRef:
              name: {{ include "cadence.fullname" $ }}-secrets
              key: {{ .secretKey }}
        {{- end }}
        {{- end }}
        # Additional environment variables from config
        {{- range $key, $value := .Values.config }}
        {{- if not (has $key (list "RUST_LOG")) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.config.RUST_LOG }}
        - name: RUST_LOG
          value: {{ .Values.config.RUST_LOG | quote }}
        {{- end }}
        # Custom environment variables
        {{- with .Values.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /app/cadence.yml
          subPath: cadence.yml
          readOnly: true
        {{- if .Values.persistence.enabled }}
        - name: data
          mountPath: {{ .Values.persistence.mountPath | default "/app/data" }}
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ include "cadence.fullname" . }}
          items:
          - key: cadence.yml
            path: cadence.yml
      {{- if .Values.persistence.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "cadence.fullname" . }}-data
      {{- end }}
      {{- $nodePool := include "cadence.nodePool" . -}}
      {{- if or $nodePool .Values.nodeSelector }}
      nodeSelector:
        {{- if $nodePool }}
        node-pool: {{ $nodePool }}
        {{- end }}
        {{- with .Values.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or $nodePool .Values.tolerations }}
      tolerations:
        {{- if $nodePool }}
        - key: "node-pool"
          operator: "Equal"
          value: {{ $nodePool | quote }}
          effect: "NoSchedule"
        {{- end }}
        {{- with .Values.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
