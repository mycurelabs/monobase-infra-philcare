{{- if and .Values.enabled .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mycure.fullname" . }}
  namespace: {{ include "mycure.namespace" . }}
  labels:
    {{- include "mycure.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "mycure.gateway.name" . }}
      namespace: {{ include "mycure.gateway.namespace" . }}
      {{- if .Values.gateway.sectionName }}
      sectionName: {{ .Values.gateway.sectionName }}
      {{- else }}
      sectionName: https  # Default: attach to HTTPS listener
      {{- end }}
  hostnames:
    {{- if .Values.gateway.hostnames }}
    {{- range .Values.gateway.hostnames }}
    - {{ . }}
    {{- end }}
    {{- else }}
    - {{ include "mycure.gateway.hostname" . }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      {{- with .Values.gateway.responseHeaders }}
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            {{- with .set }}
            set:
              {{- range $name, $value := . }}
              - name: {{ $name | quote }}
                value: {{ $value | quote }}
              {{- end }}
            {{- end }}
            {{- with .add }}
            add:
              {{- range $name, $value := . }}
              - name: {{ $name | quote }}
                value: {{ $value | quote }}
              {{- end }}
            {{- end }}
            {{- with .remove }}
            remove:
              {{- toYaml . | nindent 14 }}
            {{- end }}
      {{- end }}
      backendRefs:
        - name: {{ include "mycure.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 1
{{- end }}
